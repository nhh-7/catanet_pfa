# general settings
name: test_CAPANet_x2
model_type: CATANetModel
scale: 2
num_gpu: 1
manual_seed: 3407

datasets:
  test_1:  # the 1st test dataset
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /home/featurize/data/TestDataSR/HR/Set5/x2
    dataroot_lq: /home/featurize/data/TestDataSR/LR/LRBI/Set5/x2
    filename_tmpl: '{}'
    io_backend:
      type: disk

  test_2:  # the 2nd test dataset
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /home/featurize/data/TestDataSR/HR/Set14/x2
    dataroot_lq: /home/featurize/data/TestDataSR/LR/LRBI/Set14/x2
    filename_tmpl: '{}'
    io_backend:
      type: disk

  test_3:  # the 3rd test dataset
    name: B100
    type: PairedImageDataset
    dataroot_gt: /home/featurize/data/TestDataSR/HR/B100/x2
    dataroot_lq: /home/featurize/data/TestDataSR/LR/LRBI/B100/x2
    filename_tmpl: '{}'
    io_backend:
      type: disk

  test_4:  # the 4th test dataset
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: /home/featurize/data/TestDataSR/HR/Urban100/x2
    dataroot_lq: /home/featurize/data/TestDataSR/LR/LRBI/Urban100/x2
    filename_tmpl: '{}'
    io_backend:
      type: disk

  test_5:  # the 5th test dataset
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: /home/featurize/data/TestDataSR/HR/Manga109/x2
    dataroot_lq: /home/featurize/data/TestDataSR/LR/LRBI/Manga109/x2
    filename_tmpl: '{}'
    io_backend:
      type: disk



# network structures
network_g:
  type: CAPANet
  upscale: 2

# path
path:
  pretrain_network_g: ~
  strict_load_g: false
  results_root: results/CAPANet

# validation settings
val:
  save_img: true
  suffix: CAPANet  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr_pt
      crop_border: 2
      test_y_channel: true
    ssim:
      type: calculate_ssim_pt
      crop_border: 2
      test_y_channel: true
