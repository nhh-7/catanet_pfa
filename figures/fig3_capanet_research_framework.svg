<svg xmlns="http://www.w3.org/2000/svg" viewBox="15 12 1070 725" role="img" aria-labelledby="title desc">
  <title id="title">图 3 CAPANet 研究内容框架图</title>
  <desc id="desc">CAPANet 研究内容框架图。图中按照研究内容一、研究内容二和研究内容三三条横向链路展开，每条链路均由研究问题、研究目标和研究方法组成，并通过路由先验和有效交互体现三项研究内容之间的递进关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#000000"/>
    </marker>
    <marker id="arrowSmall" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#000000"/>
    </marker>
  </defs>
  <style>
    .box { fill: #ffffff; stroke: #000000; stroke-width: 2.2; }
    .line { stroke: #000000; stroke-width: 2.1; fill: none; }
    .arrow { stroke: #000000; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
    .smallArrow { stroke: #000000; stroke-width: 1.9; fill: none; marker-end: url(#arrowSmall); }
    .titleText { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 27px; font-weight: 700; fill: #000000; letter-spacing: 0; }
    .headerText { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #000000; letter-spacing: 0; }
    .labelText { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #000000; letter-spacing: 0; }
    .bodyText { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 19px; fill: #000000; letter-spacing: 0; }
    .smallText { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 18px; fill: #000000; letter-spacing: 0; }
    .linkText { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 19px; fill: #000000; letter-spacing: 0; }
  </style>

  <rect width="1100" height="735" fill="#ffffff"/>

  <rect x="250" y="24" width="700" height="70" class="box"/>
  <text x="600" y="68" text-anchor="middle" class="titleText">面向轻量级图像超分辨率的 CAPANet 研究内容</text>

  <path d="M600 94 L600 126" class="arrow"/>

  <text x="286" y="142" text-anchor="middle" class="headerText">研究问题</text>
  <text x="600" y="142" text-anchor="middle" class="headerText">研究目标</text>
  <text x="936" y="142" text-anchor="middle" class="headerText">研究方法</text>

  <rect x="28" y="168" width="112" height="116" class="box"/>
  <text x="84" y="216" text-anchor="middle" class="labelText">
    <tspan x="84" dy="0">研究内容</tspan>
    <tspan x="84" dy="30">一</tspan>
  </text>
  <rect x="170" y="168" width="232" height="116" class="box"/>
  <text x="286" y="202" text-anchor="middle" class="bodyText">
    <tspan x="286" dy="0">CATANet 聚合后</tspan>
    <tspan x="286" dy="27">语义中心刻画不足</tspan>
    <tspan x="286" dy="27">路由元信息复用不足</tspan>
  </text>
  <path d="M408 226 L468 226" class="arrow"/>
  <rect x="478" y="168" width="244" height="116" class="box"/>
  <text x="600" y="202" text-anchor="middle" class="bodyText">
    <tspan x="600" dy="0">生成动态语义原型</tspan>
    <tspan x="600" dy="27">刻画 token 归属</tspan>
    <tspan x="600" dy="27">支撑后续协同重建</tspan>
  </text>
  <path d="M728 226 L788 226" class="arrow"/>
  <rect x="798" y="168" width="274" height="116" class="box"/>
  <text x="936" y="195" text-anchor="middle" class="bodyText">
    <tspan x="936" dy="0">DPR 动态语义</tspan>
    <tspan x="936" dy="25">原型路由</tspan>
    <tspan x="936" dy="25">原型生成、置信路由</tspan>
    <tspan x="936" dy="25">路由元信息复用</tspan>
  </text>

  <path d="M936 284 L936 318" class="arrow"/>
  <text x="960" y="306" text-anchor="start" class="linkText">路由先验</text>

  <rect x="28" y="326" width="112" height="116" class="box"/>
  <text x="84" y="374" text-anchor="middle" class="labelText">
    <tspan x="84" dy="0">研究内容</tspan>
    <tspan x="84" dy="30">二</tspan>
  </text>
  <rect x="170" y="326" width="232" height="116" class="box"/>
  <text x="286" y="360" text-anchor="middle" class="bodyText">
    <tspan x="286" dy="0">注意力冗余</tspan>
    <tspan x="286" dy="27">无效连接较多</tspan>
    <tspan x="286" dy="27">计算分配不均</tspan>
  </text>
  <path d="M408 384 L468 384" class="arrow"/>
  <rect x="478" y="326" width="244" height="116" class="box"/>
  <text x="600" y="360" text-anchor="middle" class="bodyText">
    <tspan x="600" dy="0">筛选关键连接</tspan>
    <tspan x="600" dy="27">压缩低价值交互</tspan>
    <tspan x="600" dy="27">提高计算有效性</tspan>
  </text>
  <path d="M728 384 L788 384" class="arrow"/>
  <rect x="798" y="326" width="274" height="116" class="box"/>
  <text x="936" y="353" text-anchor="middle" class="bodyText">
    <tspan x="936" dy="0">PFSA 渐进聚焦</tspan>
    <tspan x="936" dy="25">稀疏注意力</tspan>
    <tspan x="936" dy="25">先验继承、焦点率</tspan>
    <tspan x="936" dy="25">TopK 稀疏交互</tspan>
  </text>

  <path d="M936 442 L936 476" class="arrow"/>
  <text x="960" y="464" text-anchor="start" class="linkText">有效交互</text>

  <rect x="28" y="484" width="112" height="116" class="box"/>
  <text x="84" y="532" text-anchor="middle" class="labelText">
    <tspan x="84" dy="0">研究内容</tspan>
    <tspan x="84" dy="30">三</tspan>
  </text>
  <rect x="170" y="484" width="232" height="116" class="box"/>
  <text x="286" y="518" text-anchor="middle" class="bodyText">
    <tspan x="286" dy="0">低中高频重建</tspan>
    <tspan x="286" dy="27">缺乏协同</tspan>
    <tspan x="286" dy="27">细节恢复不稳定</tspan>
  </text>
  <path d="M408 542 L468 542" class="arrow"/>
  <rect x="478" y="484" width="244" height="116" class="box"/>
  <text x="600" y="518" text-anchor="middle" class="bodyText">
    <tspan x="600" dy="0">低频到高频</tspan>
    <tspan x="600" dy="27">递进恢复</tspan>
    <tspan x="600" dy="27">兼顾结构与纹理</tspan>
  </text>
  <path d="M728 542 L788 542" class="arrow"/>
  <rect x="798" y="484" width="274" height="116" class="box"/>
  <text x="936" y="511" text-anchor="middle" class="bodyText">
    <tspan x="936" dy="0">LMR 低到高</tspan>
    <tspan x="936" dy="25">多级协同重建</tspan>
    <tspan x="936" dy="25">低频结构、中频过渡</tspan>
    <tspan x="936" dy="25">高频纹理增强</tspan>
  </text>

  <path d="M286 612 L286 640 L936 640 L936 612" class="line"/>
  <path d="M600 640 L600 668" class="arrow"/>
  <rect x="370" y="678" width="460" height="50" class="box"/>
  <text x="600" y="710" text-anchor="middle" class="headerText">轻量级预算下提升超分辨率重建质量</text>
</svg>
