<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 980" role="img" aria-labelledby="title desc">
  <title id="title">图 6 PFSA 模块结构示意图</title>
  <desc id="desc">PFSA 渐进聚焦稀疏注意力模块结合 DPR 路由结果、当前内容相似性和上一层注意力先验，按低频、中频、高频分支使用 depth-aware learnable beta 融合得到聚焦分布，计算动态焦点率，结合 TopK 与 cluster-aware mask 执行局部稀疏注意力；全局中心弱分支不参与 TopK 或注意力状态递推，只在输出处通过 eta_s 融合，最终输出重建特征和当前层注意力状态。</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f7f7f7"/>
      <stop offset="1" stop-color="#f3f4f6"/>
    </linearGradient>
    <linearGradient id="pfsaBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6f84a6"/>
      <stop offset="1" stop-color="#5f756e"/>
    </linearGradient>
    <linearGradient id="focusBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f6f7"/>
      <stop offset="1" stop-color="#f4f7f7"/>
    </linearGradient>
    <linearGradient id="maskBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0ead7"/>
      <stop offset="1" stop-color="#f7f3eb"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="124%">
      <feDropShadow dx="0" dy="9" stdDeviation="3" flood-color="#111111" flood-opacity="0.04"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M1,1 L12,6.5 L1,12 Z" fill="#333333"/>
    </marker>
    <marker id="softArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#666666"/>
    </marker>
  </defs>
  <style>
    .title { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #111111; letter-spacing: 0; }
    .subtitle { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 20px; fill: #4d4d4d; letter-spacing: 0; }
    .label { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #111111; letter-spacing: 0; }
    .module { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 19px; font-weight: 700; fill: #111111; letter-spacing: 0; }
    .small { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 16px; fill: #4d4d4d; letter-spacing: 0; }
    .tiny { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 13px; fill: #666666; letter-spacing: 0; }
    .white { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #ffffff; letter-spacing: 0; }
    .whiteSmall { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 15px; fill: #eef3f5; letter-spacing: 0; }
    .math { font-family: "Times New Roman", "Noto Sans CJK SC", serif; font-size: 20px; fill: #333333; letter-spacing: 0; }
    .mathSmall { font-family: "Times New Roman", "Noto Sans CJK SC", serif; font-size: 17px; fill: #4d4d4d; letter-spacing: 0; }
    .panel { fill: #ffffff; stroke: #bdbdbd; stroke-width: 2; }
    .arrowLine { stroke: #333333; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .softLine { stroke: #666666; stroke-width: 2.2; fill: none; stroke-dasharray: 7 6; marker-end: url(#softArrow); }
    .matrixGrid { stroke: #ffffff; stroke-width: 1.4; }
  </style>

  <rect width="1700" height="980" fill="url(#pageBg)"/>
  <text x="850" y="58" text-anchor="middle" class="title">PFSA 渐进聚焦稀疏注意力模块</text>
  <text x="850" y="92" text-anchor="middle" class="subtitle">融合当前内容相关性与前序注意力先验，动态保留关键连接；全局中心仅作弱分支补充</text>

  <g filter="url(#shadow)">
    <rect x="58" y="160" width="260" height="250" rx="10" class="panel"/>
    <text x="188" y="202" text-anchor="middle" class="label">输入特征</text>
    <text x="188" y="236" text-anchor="middle" class="math">X_l</text>
    <rect x="94" y="268" width="76" height="46" rx="7" fill="#f5f6f7" stroke="#8ea3bd" stroke-width="2"/>
    <text x="132" y="298" text-anchor="middle" class="module">Q_l</text>
    <rect x="186" y="268" width="76" height="46" rx="7" fill="#f4f7f7" stroke="#9fb3aa" stroke-width="2"/>
    <text x="224" y="298" text-anchor="middle" class="module">K_l,V_l</text>
    <text x="188" y="348" text-anchor="middle" class="tiny">由线性投影得到 Query / Key / Value</text>
    <text x="188" y="376" text-anchor="middle" class="tiny">接收 DPR 排序后的内容邻近序列</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="58" y="495" width="260" height="220" rx="10" fill="#f7f7f7" stroke="#9a9a9a" stroke-width="2"/>
    <text x="188" y="536" text-anchor="middle" class="label">DPR 路由先验</text>
    <rect x="92" y="566" width="192" height="34" rx="6" fill="#ffffff" stroke="#bdbdbd" stroke-width="1.6"/>
    <text x="188" y="589" text-anchor="middle" class="module">sorted_belong_idx</text>
    <rect x="92" y="612" width="192" height="34" rx="6" fill="#ffffff" stroke="#bdbdbd" stroke-width="1.6"/>
    <text x="188" y="635" text-anchor="middle" class="module">x_scores</text>
    <text x="188" y="676" text-anchor="middle" class="tiny">提供组标签、组内纯度与分数方差</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="384" y="146" width="308" height="190" rx="10" fill="url(#focusBg)" stroke="#8ea3bd" stroke-width="2.4"/>
    <text x="538" y="188" text-anchor="middle" class="label">当前内容相关性</text>
    <text x="538" y="224" text-anchor="middle" class="math">A_cur = Softmax(Q_l K_l^T / √d)</text>
    <g transform="translate(462 252)">
      <rect x="0" y="0" width="152" height="54" rx="6" fill="#ffffff" stroke="#dce3ec" stroke-width="1.6"/>
      <rect x="12" y="10" width="24" height="14" fill="#dce3ec"/>
      <rect x="42" y="10" width="24" height="14" fill="#b3c2d3"/>
      <rect x="72" y="10" width="24" height="14" fill="#edf1f5"/>
      <rect x="102" y="10" width="24" height="14" fill="#cbd6e2"/>
      <rect x="12" y="30" width="24" height="14" fill="#b3c2d3"/>
      <rect x="42" y="30" width="24" height="14" fill="#4f647d"/>
      <rect x="72" y="30" width="24" height="14" fill="#dce3ec"/>
      <rect x="102" y="30" width="24" height="14" fill="#8ea3bd"/>
    </g>
    <text x="538" y="320" text-anchor="middle" class="tiny">当前层由内容生成的注意力分布</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="384" y="400" width="308" height="170" rx="10" fill="#ffffff" stroke="#9a9a9a" stroke-width="2"/>
    <text x="538" y="442" text-anchor="middle" class="label">上一层聚焦先验</text>
    <text x="538" y="478" text-anchor="middle" class="math">A_prev^s</text>
    <g transform="translate(462 504)" opacity="0.92">
      <rect x="0" y="0" width="152" height="34" rx="6" fill="#f7f7f7" stroke="#bdbdbd" stroke-width="1.6"/>
      <circle cx="22" cy="17" r="8" fill="#6f84a6"/>
      <circle cx="58" cy="17" r="5" fill="#b3c2d3"/>
      <circle cx="94" cy="17" r="7" fill="#5f756e"/>
      <circle cx="130" cy="17" r="4" fill="#9a9a9a"/>
    </g>
    <text x="538" y="554" text-anchor="middle" class="tiny">按 lf / mf / hf 分支分别继承</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="384" y="630" width="308" height="180" rx="10" fill="#ffffff" stroke="#9fb3aa" stroke-width="2.4"/>
    <text x="538" y="672" text-anchor="middle" class="label">Cluster-aware Mask</text>
    <text x="538" y="706" text-anchor="middle" class="mathSmall">same(sorted_belong_idx)</text>
    <g transform="translate(477 730)">
      <rect x="0" y="0" width="120" height="48" rx="5" fill="#f7f7f7" stroke="#bdbdbd" stroke-width="1.5"/>
      <rect x="10" y="9" width="18" height="12" fill="#5f756e"/>
      <rect x="34" y="9" width="18" height="12" fill="#5f756e"/>
      <rect x="58" y="9" width="18" height="12" fill="#e5e5e5"/>
      <rect x="82" y="9" width="18" height="12" fill="#e5e5e5"/>
      <rect x="10" y="27" width="18" height="12" fill="#5f756e"/>
      <rect x="34" y="27" width="18" height="12" fill="#5f756e"/>
      <rect x="58" y="27" width="18" height="12" fill="#6f84a6"/>
      <rect x="82" y="27" width="18" height="12" fill="#6f84a6"/>
    </g>
    <text x="538" y="794" text-anchor="middle" class="tiny">限制非同组 Token 的无效交互</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="730" y="196" width="410" height="220" rx="10" fill="#ffffff" stroke="#6f84a6" stroke-width="2.4"/>
    <text x="935" y="238" text-anchor="middle" class="label">注意力先验融合</text>
    <text x="935" y="274" text-anchor="middle" class="math">A_hat^s = β_{l,s}A_prev^s + (1-β_{l,s})A_cur</text>
    <text x="935" y="310" text-anchor="middle" class="small">β_{l,s}: depth-aware learnable beta</text>
    <g transform="translate(835 338)">
      <rect x="0" y="0" width="200" height="42" rx="7" fill="#f5f6f7" stroke="#dce3ec" stroke-width="1.6"/>
      <text x="100" y="27" text-anchor="middle" class="module">融合聚焦分布 A_hat^s</text>
    </g>
    <text x="935" y="398" text-anchor="middle" class="tiny">当前内容与历史先验共同决定候选连接价值</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="505" width="330" height="220" rx="10" fill="url(#maskBg)" stroke="#c5b27d" stroke-width="2.4"/>
    <text x="935" y="547" text-anchor="middle" class="label">内容感知焦点率</text>
    <text x="935" y="582" text-anchor="middle" class="mathSmall">r_s = clip(r_base + λ_p purity - λ_v var)</text>
    <text x="935" y="616" text-anchor="middle" class="small">r_s ∈ [0.25, 0.75]</text>
    <g transform="translate(830 642)">
      <rect x="0" y="0" width="96" height="42" rx="7" fill="#ffffff" stroke="#e7ddca" stroke-width="1.6"/>
      <text x="48" y="26" text-anchor="middle" class="module">purity</text>
      <rect x="114" y="0" width="96" height="42" rx="7" fill="#ffffff" stroke="#e7ddca" stroke-width="1.6"/>
      <text x="162" y="26" text-anchor="middle" class="module">var</text>
    </g>
    <text x="935" y="708" text-anchor="middle" class="tiny">组内越纯保留越多；越混杂保留越少</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1182" y="300" width="330" height="250" rx="10" fill="#ffffff" stroke="#c5b27d" stroke-width="2.4"/>
    <text x="1347" y="342" text-anchor="middle" class="label">TopK 稀疏连接掩码</text>
    <text x="1347" y="378" text-anchor="middle" class="math">M_topk = TopK(A_hat^s, r_s)</text>
    <g transform="translate(1262 408)">
      <rect x="0" y="0" width="170" height="82" rx="7" fill="#f7f7f7" stroke="#bdbdbd" stroke-width="1.6"/>
      <g>
        <rect x="12" y="10" width="22" height="14" fill="#6f84a6"/>
        <rect x="40" y="10" width="22" height="14" fill="#e5e5e5"/>
        <rect x="68" y="10" width="22" height="14" fill="#6f84a6"/>
        <rect x="96" y="10" width="22" height="14" fill="#e5e5e5"/>
        <rect x="124" y="10" width="22" height="14" fill="#5f756e"/>
        <rect x="12" y="34" width="22" height="14" fill="#e5e5e5"/>
        <rect x="40" y="34" width="22" height="14" fill="#6f84a6"/>
        <rect x="68" y="34" width="22" height="14" fill="#e5e5e5"/>
        <rect x="96" y="34" width="22" height="14" fill="#5f756e"/>
        <rect x="124" y="34" width="22" height="14" fill="#e5e5e5"/>
        <rect x="12" y="58" width="22" height="14" fill="#5f756e"/>
        <rect x="40" y="58" width="22" height="14" fill="#e5e5e5"/>
        <rect x="68" y="58" width="22" height="14" fill="#6f84a6"/>
        <rect x="96" y="58" width="22" height="14" fill="#e5e5e5"/>
        <rect x="124" y="58" width="22" height="14" fill="#6f84a6"/>
      </g>
      <g class="matrixGrid">
        <line x1="38" y1="0" x2="38" y2="82"/>
        <line x1="66" y1="0" x2="66" y2="82"/>
        <line x1="94" y1="0" x2="94" y2="82"/>
        <line x1="122" y1="0" x2="122" y2="82"/>
        <line x1="0" y1="28" x2="170" y2="28"/>
        <line x1="0" y1="54" x2="170" y2="54"/>
      </g>
    </g>
    <text x="1347" y="528" text-anchor="middle" class="tiny">与 cluster mask 合并后得到最终局部稀疏掩码</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1182" y="625" width="330" height="190" rx="10" fill="url(#pfsaBg)"/>
    <text x="1347" y="667" text-anchor="middle" class="white">稀疏注意力计算</text>
    <text x="1347" y="704" text-anchor="middle" class="whiteSmall">Y_local = Attention(Q_l,K_l,V_l; M_final)</text>
    <rect x="1240" y="734" width="214" height="42" rx="7" fill="#ffffff" opacity="0.96"/>
    <text x="1347" y="761" text-anchor="middle" class="module">仅在关键连接上交互</text>
    <text x="1347" y="800" text-anchor="middle" class="whiteSmall">Y = Y_local + η_s · Y_global</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1182" y="112" width="330" height="120" rx="10" class="panel"/>
    <text x="1347" y="150" text-anchor="middle" class="label">全局中心弱分支</text>
    <text x="1347" y="184" text-anchor="middle" class="mathSmall">Y_global = Attn(Q_l,k_g,v_g)</text>
    <text x="1347" y="211" text-anchor="middle" class="tiny">不参与 TopK / cluster mask / attn_state</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="540" y="856" width="620" height="78" rx="10" class="panel"/>
    <text x="850" y="888" text-anchor="middle" class="label">PFSA 输出</text>
    <text x="850" y="918" text-anchor="middle" class="small">重建特征 Y_s 与 current_attn_state_s，按 lf / mf / hf 传递给下一层</text>
  </g>

  <path d="M320 270 C346 258, 362 246, 372 232" class="arrowLine"/>
  <path d="M320 604 C348 624, 362 660, 372 704" class="arrowLine"/>
  <path d="M694 238 C708 246, 720 260, 730 276" class="arrowLine"/>
  <path d="M694 485 C710 438, 722 398, 730 355" class="arrowLine"/>
  <path d="M694 718 C724 684, 744 646, 760 613" class="arrowLine"/>
  <path d="M1140 306 C1154 320, 1168 340, 1182 364" class="arrowLine"/>
  <path d="M1102 616 C1134 582, 1156 520, 1170 464" class="arrowLine"/>
  <path d="M1347 552 C1347 578, 1347 600, 1347 616" class="arrowLine"/>
  <path d="M1514 172 C1600 300, 1600 650, 1514 720" class="softLine"/>
  <path d="M1182 720 C1118 802, 1010 846, 936 854" class="arrowLine"/>
  <path d="M1347 816 C1280 870, 1210 898, 1172 898" class="softLine"/>

  <g filter="url(#shadow)">
    <rect x="72" y="832" width="330" height="104" rx="10" class="panel"/>
    <text x="237" y="866" text-anchor="middle" class="label">模块价值</text>
    <text x="104" y="900" class="small">减少无关 Token 强制交互</text>
    <text x="104" y="924" class="small">让计算资源集中在高价值连接</text>
  </g>
  <path d="M404 884 C456 890, 492 894, 528 898" class="softLine"/>
</svg>
