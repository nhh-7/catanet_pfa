<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1438 760" role="img" aria-labelledby="title desc">
  <title id="title">图 1 单幅图像超分辨率任务示意图</title>
  <desc id="desc">单幅图像超分辨率任务从单张低分辨率图像输入出发，经超分辨率重建网络恢复高分辨率图像，并以真实高分辨率图像作为训练监督和质量评价参考。</desc>
  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7f7f7"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dbe4eb"/>
      <stop offset="1" stop-color="#f5f7f8"/>
    </linearGradient>
    <linearGradient id="modelBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f9f8"/>
      <stop offset="1" stop-color="#f3f4f6"/>
    </linearGradient>
    <linearGradient id="srBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5f756e"/>
      <stop offset="1" stop-color="#6f84a6"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="3" flood-color="#111111" flood-opacity="0.04"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M1,1 L12,6.5 L1,12 Z" fill="#333333"/>
    </marker>
    <marker id="dashArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#666666"/>
    </marker>
    <clipPath id="lrClip">
      <rect x="104" y="216" width="224" height="224" rx="8"/>
    </clipPath>
    <clipPath id="srClip">
      <rect x="1006" y="166" width="328" height="328" rx="10"/>
    </clipPath>
  </defs>
  <style>
    .title { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #111111; letter-spacing: 0; }
    .label { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #111111; letter-spacing: 0; }
    .sub { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 20px; fill: #4d4d4d; letter-spacing: 0; }
    .small { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 17px; fill: #4d4d4d; letter-spacing: 0; }
    .tiny { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 15px; fill: #666666; letter-spacing: 0; }
    .math { font-family: "Times New Roman", "Noto Sans CJK SC", serif; font-size: 21px; fill: #333333; letter-spacing: 0; }
    .panel { fill: url(#panelBg); stroke: #bdbdbd; stroke-width: 2; }
    .module { fill: #ffffff; stroke: #dde8e4; stroke-width: 2; }
    .callout { fill: #f7f7f7; stroke: #9a9a9a; stroke-width: 2; stroke-dasharray: 9 7; }
    .gridLine { stroke: #ffffff; stroke-width: 1; opacity: 0.58; }
    .arrowText { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", Arial, sans-serif; font-size: 19px; font-weight: 700; fill: #333333; letter-spacing: 0; }
  </style>

  <rect width="1438" height="760" fill="#ffffff"/>
  <text x="719" y="66" text-anchor="middle" class="title">单幅图像超分辨率任务流程</text>
  <text x="719" y="102" text-anchor="middle" class="sub">从单张低分辨率图像恢复清晰结构、边缘与纹理细节</text>

