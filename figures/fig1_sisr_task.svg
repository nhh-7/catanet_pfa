    <text x="667" y="286" text-anchor="middle" class="math">SR = fθ(LR)</text>
    <rect x="545" y="316" width="245" height="36" rx="8" class="module"/>
    <text x="667" y="340" text-anchor="middle" class="small">浅层特征提取</text>
    <rect x="545" y="362" width="245" height="36" rx="8" class="module"/>
    <text x="667" y="386" text-anchor="middle" class="small">深层非线性特征映射</text>
    <rect x="545" y="408" width="245" height="36" rx="8" class="module"/>
    <text x="667" y="432" text-anchor="middle" class="small">上下文交互与细节重建</text>
    <rect x="545" y="454" width="245" height="36" rx="8" class="module"/>
    <text x="667" y="478" text-anchor="middle" class="small">上采样与图像恢复 ×2 / ×3 / ×4</text>
  </g>

  <path d="M388 350 C426 350, 456 350, 496 350" fill="none" stroke="#333333" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="442" y="324" text-anchor="middle" class="arrowText">输入</text>
  <path d="M838 350 C882 350, 914 350, 958 350" fill="none" stroke="#333333" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="898" y="324" text-anchor="middle" class="arrowText">超分辨率重建</text>

